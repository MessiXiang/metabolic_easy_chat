name: Build macOS App Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: macos-app-release
  cancel-in-progress: true

jobs:
  build-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build Release app
        run: |
          set -euo pipefail
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          CODE_SIGNING_ARGS=(CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="")
          if [[ -n "${MACOS_CERTIFICATE_P12:-}" && -n "${MACOS_CERTIFICATE_PASSWORD:-}" ]]; then
            KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
            CERTIFICATE_PATH="$RUNNER_TEMP/app-signing.p12"
            printf '%s' "$MACOS_CERTIFICATE_P12" | base64 --decode > "$CERTIFICATE_PATH"
            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security import "$CERTIFICATE_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            security list-keychain -d user -s "$KEYCHAIN_PATH"
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            CODE_SIGNING_ARGS=(CODE_SIGNING_ALLOWED=YES CODE_SIGNING_REQUIRED=YES CODE_SIGN_IDENTITY="Apple Development" DEVELOPMENT_TEAM="G78YGD8GUU")
          fi
          xcodebuild \
            -project metabolic_easy_chat.xcodeproj \
            -scheme metabolic_easy_chat \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            SPARKLE_PUBLIC_ED_KEY="${{ secrets.SPARKLE_PUBLIC_ED_KEY }}" \
            "${CODE_SIGNING_ARGS[@]}" \
            build
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}

      - name: Package app zip
        run: |
          set -euo pipefail
          APP_PATH="build/DerivedData/Build/Products/Release/metabolic_easy_chat.app"
          test -d "$APP_PATH"
          rm -rf build/release
          mkdir -p build/release
          ditto -c -k --keepParent "$APP_PATH" build/release/metabolic_easy_chat.zip
          shasum -a 256 build/release/metabolic_easy_chat.zip | awk '{print $1}' > build/release/metabolic_easy_chat.zip.sha256
          cat > build/release/release-notes.md <<EOF
          Automated macOS app build from main.

          Commit: ${GITHUB_SHA}
          Build: ${GITHUB_RUN_NUMBER}
          SHA-256: $(cat build/release/metabolic_easy_chat.zip.sha256)
          EOF

      - name: Sign update archive with Sparkle
        id: sparkle
        env:
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: |
          set -euo pipefail
          SIGNATURE=""
          if [[ -n "${SPARKLE_PRIVATE_ED_KEY:-}" ]]; then
            SIGN_UPDATE="$(find build/DerivedData/SourcePackages/artifacts -path '*/bin/sign_update' -type f | head -n 1)"
            if [[ -z "$SIGN_UPDATE" ]]; then
              echo "Sparkle sign_update tool was not found." >&2
              exit 1
            fi
            SIGNATURE="$(printf '%s' "$SPARKLE_PRIVATE_ED_KEY" | "$SIGN_UPDATE" --ed-key-file - build/release/metabolic_easy_chat.zip | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')"
            if [[ -z "$SIGNATURE" ]]; then
              echo "Sparkle signature was empty." >&2
              exit 1
            fi
            printf '%s' "$SPARKLE_PRIVATE_ED_KEY" > build/release/sparkle_private_key.txt
            "$SIGN_UPDATE" --verify --ed-key-file build/release/sparkle_private_key.txt build/release/metabolic_easy_chat.zip "$SIGNATURE"
            rm -f build/release/sparkle_private_key.txt
          fi
          echo "signature=$SIGNATURE" >> "$GITHUB_OUTPUT"

      - name: Generate Sparkle appcast
        run: |
          set -euo pipefail
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/latest/metabolic_easy_chat.zip"
          python3 ci_scripts/make_appcast.py \
            --output build/release/appcast.xml \
            --version "${GITHUB_RUN_NUMBER}" \
            --short-version "0.0.${GITHUB_RUN_NUMBER}" \
            --download-url "$DOWNLOAD_URL" \
            --asset-path build/release/metabolic_easy_chat.zip \
            --signature "${{ steps.sparkle.outputs.signature }}" \
            --title "metabolic_easy_chat build ${GITHUB_RUN_NUMBER}" \
            --description "Automated build from ${GITHUB_SHA}."

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest metabolic_easy_chat macOS App
          body_path: build/release/release-notes.md
          files: |
            build/release/metabolic_easy_chat.zip
            build/release/metabolic_easy_chat.zip.sha256
            build/release/appcast.xml
          make_latest: true
          prerelease: false
          draft: false

      - name: Prepare Pages appcast
        run: |
          set -euo pipefail
          cp build/release/appcast.xml docs/appcast.xml

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - uses: actions/deploy-pages@v4
        with:
          enablement: true
